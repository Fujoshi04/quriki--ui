<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quirki | the platform that was built for you.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root {
            --teal: #00e5c4;
            --teal-glow: rgba(0, 229, 196, 0.08);
        }
        body { font-family: 'DM Sans', sans-serif; font-weight: 300; }
        .font-serif-italic { font-family: 'Playfair Display', Georgia, serif; font-style: italic; font-weight: 600; }
        .font-serif-normal { font-family: 'Playfair Display', Georgia, serif; font-weight: 600; }
        
        .custom-teal-glow { background-color: var(--teal-glow); border: 1.5px solid rgba(0,229,196,0.25); }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up { animation: fadeUp 0.35s ease both; }
    </style>
</head>
<body class="bg-[#1a1c1e] text-slate-200 min-h-screen antialiased transition-colors duration-300 dark:bg-[#1a1c1e] dark:text-slate-200 bg-slate-50 text-slate-900">

    <div id="root"></div>

    <script type="text/babel">
        function QuirkiApp() {
            // Detect user system preferences for dark/light mode instantly on start
            const getInitialTheme = () => {
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) {
                    document.documentElement.classList.remove('dark');
                    return false;
                }
                document.documentElement.classList.add('dark');
                return true;
            };

            const [isDarkMode, setIsDarkMode] = React.useState(getInitialTheme);
            const [selectedRoles, setSelectedRoles] = React.useState([]);
            const [isLoggedIn, setIsLoggedIn] = React.useState(false);
            
            // Authorization States
            const [username, setUsername] = React.useState("");
            const [password, setPassword] = React.useState("");
            const [loginError, setLoginError] = React.useState("");
            const [authMode, setAuthMode] = React.useState("signin"); // "signin" or "signup"

            const toggleTheme = () => {
                const rootElement = document.documentElement;
                if (isDarkMode) {
                    rootElement.classList.remove('dark');
                    setIsDarkMode(false);
                } else {
                    rootElement.classList.add('dark');
                    setIsDarkMode(true);
                }
            };

            const handleSelectRole = (role) => {
                if (selectedRoles.includes(role)) {
                    setSelectedRoles(selectedRoles.filter(r => r !== role));
                } else {
                    setSelectedRoles([...selectedRoles, role]);
                }
            };

            const handleShadowAuth = (e) => {
                e.preventDefault();
                if (username.toLowerCase() === "zee" && password === "quirktoons") {
                    setIsLoggedIn(true);
                    setLoginError("");
                } else {
                    setLoginError("Invalid credentials. Hint: use zee & quirktoons");
                }
            };

            const rolesData = [
                { id: "reader", emoji: "📖", title: "Join the reading community", desc: "Discover original fiction, leave real feedback, build your library" },
                { id: "author", emoji: "✍️", title: "Join the writing community", desc: "Post your work, track your readers, build your audience" },
                { id: "beta", emoji: "🔍", title: "Become a beta reader", desc: "Help authors shape their stories before they publish" },
                { id: "editor", emoji: "✏️", title: "Test your editing skills", desc: "Offer editorial feedback and earn credibility on the platform" }
            ];

            // ─── VIEW 1: AUTHENTICATED HOMEPAGE MOCKED UP FROM YOUR SOURCE HTML ───
            if (isLoggedIn) {
                return (
                    <div className="min-h-screen flex flex-col justify-between transition-colors duration-300 dark:bg-[#1a1c1e] bg-slate-50">
                        {/* Navigation Bar */}
                        <nav className="sticky top-0 z-50 px-6 h-14 flex items-center justify-between border-b dark:bg-[#1c1e20] dark:border-white/5 bg-white border-slate-200">
                            <a href="#" className="flex items-center gap-2 font-serif-italic text-xl text-[#00e5c4] no-underline">
                                <svg width="24" height="24" viewBox="0 0 26 26" fill="none">
                                    <path d="M13 9.5 C15.5 9.5 17 11 17 13 C17 15.5 15 17.2 13 17 C10.8 16.8 9 15.2 9 13 C9 10.8 10.5 9.5 13 9.5Z" fill="#00e5c4"/>
                                    <path d="M11 10 Q8.5 7.5 5 4.5" stroke="#00e5c4" strokeWidth="2.4" strokeLinecap="round"/>
                                    <path d="M14 9.5 Q16 6.5 17.5 4" stroke="#00e5c4" strokeWidth="1.8" strokeLinecap="round"/>
                                    <path d="M17 13 Q20 13.5 23 14.5" stroke="#00e5c4" strokeWidth="2" strokeLinecap="round"/>
                                    <path d="M13 17 Q12.5 20.5 12 24" stroke="#00e5c4" strokeWidth="2.2" strokeLinecap="round"/>
                                </svg>
                                quirki
                            </a>
                            <div className="flex items-center gap-4">
                                {/* Tiny Minimal Theme Switcher Icon */}
                                <button onClick={toggleTheme} className="p-1.5 rounded-full dark:text-slate-400 dark:hover:text-[#00e5c4] text-slate-500 hover:text-[#00e5c4] transition-colors">
                                    {isDarkMode ? (
                                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M12 3v2.25m0 13.5V21M4.22 4.22l1.58 1.58m12.42 12.42l1.58 1.58M3 12h2.25m13.5 0H21M4.22 19.78l1.58-1.58M17.78 4.22l-1.58 1.58M12 7.5a4.5 4.5 0 100 9 4.5 4.5 0 000-9z" /></svg>
                                    ) : (
                                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>
                                    )}
                                </button>
                                <div className="dark:text-slate-500 text-slate-400 hover:text-[#00e5c4] relative cursor-pointer transition-colors">
                                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                                        <path d="M10 2a6 6 0 0 0-6 6v2.5L2.5 13h15L16 10.5V8a6 6 0 0 0-6-6Z" stroke="currentColor" strokeWidth="1.4" strokeLinejoin="round"/>
                                        <path d="M8 15a2 2 0 0 0 4 0" stroke="currentColor" stroke-width="1.4"/>
                                    </svg>
                                    <span className="absolute top-0 right-0 w-1.5 h-1.5 bg-[#00e5c4] border border-white dark:border-[#1c1e20] rounded-full"></span>
                                </div>
                                <div className="w-8 h-8 rounded text-xs font-medium flex items-center justify-center text-[#00e5c4] custom-teal-glow">Z</div>
                            </div>
                        </nav>

                        {/* Central Dashboard View */}
                        <main className="max-w-[600px] w-full mx-auto px-6 py-10 flex-grow">
                            
                            {/* Rules Container Section */}
                            <div className="mb-12 animate-fade-up">
                                <p className="font-serif-normal text-[0.8rem] tracking-[0.14em] uppercase text-[#00e5c4] mb-5">Rules & Guidelines</p>
                                
                                {[
                                    { num: "01", title: "This is a space for original fiction", desc: "Quirki is built around original stories. That's what this community is here for." },
                                    { num: "02", title: "No spam", desc: "We're anti-spam in every form — comments, reviews, forum posts, or anything that clutters the space for everyone else." },
                                    { num: "03", title: "Engage honestly", desc: "Points exist to reflect genuine contribution. Coordinated likes, fake reviews, or any attempt to game the system will result in removal." },
                                    { num: "04", title: "Discrimination has no place here", desc: "Quirki does not tolerate homophobia, transphobia, racism, islamophobia, antisemitism, ableism, sexism, xenophobia, or discrimination of any kind." },
                                    { num: "05", title: "Quirki is 13+", desc: "We'd love to have you here — all we ask is that you register as 13 or older. Young writers and readers are very much welcome." }
                                ].map((rule, idx) => (
                                    <div key={idx} className="py-4.5 border-b dark:border-white/5 border-slate-200/60 flex gap-4 first:border-t">
                                        <span className="font-serif-normal text-[0.8rem] text-[#00e5c4] opacity-60 min-w-[20px] pt-0.5">{rule.num}</span>
                                        <div>
                                            <div className="text-[0.92rem] font-medium dark:text-slate-200 text-slate-800 mb-1">{rule.title}</div>
                                            <div className="text-[0.82rem] dark:text-slate-500 text-slate-400 font-light leading-relaxed">{rule.desc}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* Dashboard Navigation Grid */}
                            <div className="flex flex-col">
                                {[
                                    { name: "Reading", desc: "Browse stories by genre, search by tag, find your next read" },
                                    { name: "Writing", desc: "Your stories — create, update, and manage your work" },
                                    { name: "Discussion", desc: "The community forum — ideas, requests, appreciation, and help" },
                                    { name: "Board", desc: "Your personal shelves — organise stories your own way" }
                                ].map((sec, idx) => (
                                    <div key={idx} className="group flex items-center justify-between py-6 px-2 border-b dark:border-white/5 border-slate-200/60 first:border-t cursor-pointer hover:bg-teal-500/[0.04] transition-all rounded">
                                        <div className="flex flex-col gap-1">
                                            <span className="font-serif-normal text-[1.35rem] dark:text-slate-200 text-slate-800 group-hover:text-[#00e5c4] transition-colors">{sec.name}</span>
                                            <span className="text-[0.84rem] dark:text-slate-500 text-slate-400 font-light">{sec.desc}</span>
                                        </div>
                                        <span className="text-xl dark:text-slate-600 text-slate-300 opacity-40 group-hover:opacity-100 group-hover:translate-x-1 group-hover:text-[#00e5c4] transition-all">→</span>
                                    </div>
                                ))}
                            </div>

                        </main>
                    </div>
                );
            }

            // ─── VIEW 2: PUBLIC LANDING PAGE (EVERYTHING WRITTEN FIRST, AUTH AT THE VERY BOTTOM) ───
            return (
                <div className="min-h-screen flex flex-col justify-between p-6 max-w-md mx-auto relative transition-colors duration-300">
                    
                    {/* Micro Minimal Theme Switcher Icon */}
                    <button onClick={toggleTheme} className="absolute top-6 right-6 p-2 rounded-full border dark:bg-[#1c1e20] dark:border-white/5 dark:text-[#00e5c4] bg-white border-slate-200 text-[#00e5c4] hover:opacity-80 transition-all shadow-sm">
                        {isDarkMode ? (
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M12 3v2.25m0 13.5V21M4.22 4.22l1.58 1.58m12.42 12.42l1.58 1.58M3 12h2.25m13.5 0H21M4.22 19.78l1.58-1.58M17.78 4.22l-1.58 1.58M12 7.5a4.5 4.5 0 100 9 4.5 4.5 0 000-9z" /></svg>
                        ) : (
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={2} stroke="currentColor" className="w-4 h-4"><path strokeLinecap="round" strokeLinejoin="round" d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z" /></svg>
                        )}
                    </button>

                    {/* Branding Header */}
                    <header className="pt-4 flex items-center space-x-2">
                        <svg width="22" height="22" viewBox="0 0 26 26" fill="none">
                            <path d="M13 9.5 C15.5 9.5 17 11 17 13 C17 15.5 15 17.2 13 17 C10.8 16.8 9 15.2 9 13 C9 10.8 10.5 9.5 13 9.5Z" fill="#00e5c4"/>
                            <path d="M11 10 Q8.5 7.5 5 4.5" stroke="#00e5c4" strokeWidth="2.4" strokeLinecap="round"/>
                            <path d="M14 9.5 Q16 6.5 17.5 4" stroke="#00e5c4" strokeWidth="1.8" strokeLinecap="round"/>
                            <path d="M17 13 Q20 13.5 23 14.5" stroke="#00e5c4" strokeWidth="2" strokeLinecap="round"/>
                            <path d="M13 17 Q12.5 20.5 12 24" stroke="#00e5c4" strokeWidth="2.2" strokeLinecap="round"/>
                        </svg>
                        <span className="text-2xl tracking-wide font-serif-italic text-[#00e5c4]">
                            quirki
                        </span>
                    </header>

                    {/* Main Flow Stream */}
                    <main className="my-auto space-y-14 py-10">
                        
                        {/* Section 1: Hero Titles */}
                        <div className="text-center space-y-3">
                            <h2 className="text-xs font-semibold tracking-widest uppercase text-[#00e5c4]">Original Fiction Community</h2>
                            <h1 className="text-4xl md:text-5xl font-serif-normal tracking-tight leading-tight dark:text-slate-100 text-slate-900">
                                The platform <br /> that was <span className="font-serif-italic text-[#00e5c4]">built for you.</span>
                            </h1>
                            <p className="text-sm max-w-xs mx-auto leading-relaxed dark:text-slate-400 text-slate-500">
                                A free community for indie authors and readers. Just stories.
                            </p>
                        </div>

                        {/* Section 2: Manifesto Text */}
                        <div className="space-y-6">
                            <div className="space-y-0.5">
                                <h3 className="text-[11px] font-bold tracking-widest uppercase text-[#00e5c4]">The Community</h3>
                                <h2 className="text-3xl font-serif-normal dark:text-slate-100 text-slate-900">
                                    Who Quirki Is <span className="font-serif-italic text-[#00e5c4]">For</span>
                                </h2>
                            </div>
                            
                            <div className="space-y-4 text-sm leading-relaxed dark:text-slate-300 text-slate-600">
                                <p>Quirki is for the quirky teens, young adults, new adults, and adults who never quite fit the mould that publishing decided was worth building for.</p>
                                <p>It is for indie authors who have no ground to start with — no platform, no connections, no industry contacts. Just a story and the nerve to post it.</p>
                                <p>It is for people who want to understand the writing community, not just consume it — readers who leave real comments, beta readers who show up, editors who care.</p>
                            </div>

                            <ul className="space-y-2.5 pt-1">
                                {["No algorithms deciding what you see", "No paywalls between you and a good story", "No engagement metrics, just genuine community"].map((pillar, i) => (
                                    <li key={i} className="flex items-start space-x-3 text-sm">
                                        <span className="text-lg leading-none text-[#00e5c4]">—</span>
                                        <span className="dark:text-slate-300 text-slate-700">{pillar}</span>
                                    </li>
                                ))}
                            </ul>
                        </div>

                        {/* Section 3: Spaces Selection */}
                        <div className="space-y-5">
                            <h2 className="text-2xl font-serif-normal dark:text-slate-100 text-slate-900">Select your spaces</h2>
                            <div className="grid grid-cols-1 gap-2.5">
                                {rolesData.map((role) => {
                                    const isSelected = selectedRoles.includes(role.id);
                                    return (
                                        <div 
                                            key={role.id}
                                            onClick={() => handleSelectRole(role.id)}
                                            className={`p-3.5 rounded-xl border transition-all duration-200 cursor-pointer flex items-center space-x-4 select-none ${
                                                isSelected 
                                                    ? 'border-[#00e5c4] bg-teal-500/[0.06] shadow-sm' 
                                                    : 'dark:bg-[#1c1e20] dark:border-white/5 hover:border-slate-400 bg-white border-slate-200 shadow-sm'
                                            }`}
                                        >
                                            <div className="text-lg p-2 rounded-lg dark:bg-slate-900 bg-slate-100">{role.emoji}</div>
                                            <div className="space-y-0.5">
                                                <h4 className="text-xs font-bold dark:text-slate-200 text-slate-800">{role.title}</h4>
                                                <p className="text-[11px] dark:text-slate-500 text-slate-400">{role.desc}</p>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        {/* Section 4: COMBINED SIGN IN / SIGN UP AUTHENTICATION SYSTEM BOX */}
                        <div id="auth-box-anchor" className="dark:bg-[#1c1e20] bg-white border dark:border-white/5 border-slate-200 rounded-2xl p-6 shadow-sm space-y-4">
                            <div className="flex justify-between items-center border-b dark:border-white/5 border-slate-100 pb-3">
                                <div className="flex gap-4">
                                    <button 
                                        type="button"
                                        onClick={() => setAuthMode("signin")}
                                        className={`text-sm font-bold pb-1 transition-colors relative ${authMode === "signin" ? 'text-[#00e5c4]' : 'dark:text-slate-500 text-slate-400'}`}
                                    >
                                        Sign In
                                        {authMode === "signin" && <span className="absolute bottom-0 left-0 w-full h-0.5 bg-[#00e5c4]"></span>}
                                    </button>
                                    <button 
                                        type="button"
                                        onClick={() => setAuthMode("signup")}
                                        className={`text-sm font-bold pb-1 transition-colors relative ${authMode === "signup" ? 'text-[#00e5c4]' : 'dark:text-slate-500 text-slate-400'}`}
                                    >
                                        Sign Up
                                        {authMode === "signup" && <span className="absolute bottom-0 left-0 w-full h-0.5 bg-[#00e5c4]"></span>}
                                    </button>
                                </div>
                                <span className="text-[10px] font-mono uppercase dark:text-slate-600 text-slate-400">Secure Protocol</span>
                            </div>

                            <form onSubmit={handleShadowAuth} className="space-y-3">
                                <div>
                                    <input 
                                        type="text" 
                                        placeholder="Username (zee)" 
                                        value={username}
                                        onChange={(e) => setUsername(e.target.value)}
                                        className="w-full px-4 py-2.5 text-sm rounded-xl border dark:bg-[#1a1c1e] dark:border-white/5 bg-slate-50 border-slate-200 text-inherit focus:outline-none focus:border-[#00e5c4]"
                                        required
                                    />
                                </div>
                                <div>
                                    <input 
                                        type="password" 
                                        placeholder="Password (quirktoons)" 
                                        value={password}
                                        onChange={(e) => setPassword(e.target.value)}
                                        className="w-full px-4 py-2.5 text-sm rounded-xl border dark:bg-[#1a1c1e] dark:border-white/5 bg-slate-50 border-slate-200 text-inherit focus:outline-none focus:border-[#00e5c4]"
                                        required
                                    />
                                </div>

                                {loginError && (
                                    <p className="text-[11px] text-red-500 font-medium pl-1">{loginError}</p>
                                )}

                                <button type="submit" className="w-full py-3.5 rounded-xl font-medium text-sm transition-all shadow-md bg-[#00e5c4] text-slate-950 font-bold hover:opacity-90">
                                    {authMode === "signin" ? "Access Dashboard" : "Register Account"}
                                </button>
                            </form>
                        </div>

                    </main>

                    <footer className="text-center py-4 text-[11px] font-mono tracking-wider dark:text-slate-600 text-slate-400">
                        quirki original fiction platform engine v1.2
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<QuirkiApp />);
    </script>
</body>
</html>
