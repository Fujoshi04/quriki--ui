<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quirki | the platform that was built for you.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif-italic { font-family: 'Instrument Serif', serif; font-style: italic; }
        .font-serif-normal { font-family: 'Instrument Serif', serif; }
    </style>
</head>
<body class="bg-[#121314] text-slate-100 min-h-screen antialiased transition-colors duration-300 dark:bg-[#121314] dark:text-slate-100 light:bg-slate-50 light:text-slate-900">

    <div id="root"></div>

    <script type="text/babel">
        function QuirkiLanding() {
            // State for light/dark mode theme switching
            const [isDarkMode, setIsDarkMode] = React.useState(true);
            // State to keep track of selected account roles
            const [selectedRoles, setSelectedRoles] = React.useState([]);

            // Toggle HTML class between light and dark
            const toggleTheme = () => {
                const rootElement = document.documentElement;
                if (isDarkMode) {
                    rootElement.classList.add('light');
                    setIsDarkMode(false);
                } else {
                    rootElement.classList.remove('light');
                    setIsDarkMode(true);
                }
            };

            // Toggle role selection array
            const handleSelectRole = (role) => {
                if (selectedRoles.includes(role)) {
                    setSelectedRoles(selectedRoles.filter(r => r !== role));
                } else {
                    setSelectedRoles([...selectedRoles, role]);
                }
            };

            const rolesData = [
                { id: "reader", emoji: "📖", title: "Join the reading community", desc: "Discover original fiction, leave real feedback, build your library" },
                { id: "author", emoji: "✍️", title: "Join the writing community", desc: "Post your work, track your readers, build your audience" },
                { id: "beta", emoji: "🔍", title: "Become a beta reader", desc: "Help authors shape their stories before they publish" },
                { id: "editor", emoji: "✏️", title: "Test your editing skills", desc: "Offer editorial feedback and earn credibility on the platform" }
            ];

            return (
                <div className="min-h-screen flex flex-col justify-between p-6 max-w-md mx-auto relative">
                    
                    {/* Floating Theme Switcher Controller */}
                    <button 
                        onClick={toggleTheme}
                        className={`absolute top-6 right-6 px-3 py-1.5 rounded-full text-xs font-semibold uppercase tracking-wider border shadow-sm transition-all duration-200 ${
                            isDarkMode 
                            ? 'bg-slate-900 border-slate-800 text-teal-400 hover:bg-slate-800' 
                            : 'bg-white border-slate-200 text-teal-600 hover:bg-slate-100'
                        }`}
                    >
                        {isDarkMode ? "☀️ Light Mode" : "🌙 Dark Mode"}
                    </button>

                    {/* Top Branding Section */}
                    <header className="pt-4 flex items-center space-x-2">
                        {/* Custom flower/blob element inspired by logo */}
                        <svg className={`w-5 h-5 ${isDarkMode ? 'text-teal-400' : 'text-teal-600'}`} viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2a3 3 0 0 0-3 3 3 3 0 0 0-3-3 3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0-3 3 3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0 3 3 3 3 0 0 0 3-3 3 3 0 0 0-3-3 3 3 0 0 0 3-3 3 3 0 0 0-3-3 3 3 0 0 0-3 3 3 3 0 0 0-3-3V2z"/>
                        </svg>
                        <span className={`text-2xl tracking-wide font-serif-italic ${isDarkMode ? 'text-teal-400' : 'text-teal-600'}`}>
                            quirki
                        </span>
                    </header>

                    {/* Main Content Flow Blocks */}
                    <main className="my-auto space-y-16 py-12">
                        
                        {/* Section 1: Hero Block */}
                        <div className="text-center space-y-4">
                            <h2 className={`text-xs font-semibold tracking-widest uppercase ${isDarkMode ? 'text-teal-400/80' : 'text-teal-600'}`}>
                                Original Fiction Community
                            </h2>
                            <h1 className={`text-4xl md:text-5xl font-serif-normal tracking-tight leading-tight px-2 ${isDarkMode ? 'text-slate-100' : 'text-slate-900'}`}>
                                The platform <br /> that was <span className={`font-serif-italic ${isDarkMode ? 'text-teal-400' : 'text-teal-600'}`}>built for you.</span>
                            </h1>
                            <p className={`text-sm max-w-xs mx-auto leading-relaxed ${isDarkMode ? 'text-slate-400' : 'text-slate-500'}`}>
                                A free community for indie authors and readers. Just stories.
                            </p>
                        </div>

                        {/* Section 2: Manifesto Details */}
                        <div className="space-y-6">
                            <div className="space-y-1">
                                <h3 className={`text-[11px] font-bold tracking-widest uppercase ${isDarkMode ? 'text-teal-400/80' : 'text-teal-600'}`}>
                                    The Community
                                </h3>
                                <h2 className={`text-3xl font-serif-normal ${isDarkMode ? 'text-slate-100' : 'text-slate-900'}`}>
                                    Who Quirki Is <span className={`font-serif-italic ${isDarkMode ? 'text-teal-400' : 'text-teal-600'}`}>For</span>
                                </h2>
                            </div>
                            
                            <div className={`space-y-4 text-sm leading-relaxed ${isDarkMode ? 'text-slate-300' : 'text-slate-600'}`}>
                                <p>
                                    Quirki is for the quirky teens, young adults, new adults, and adults who never quite fit the mould that publishing decided was worth building for.
                                </p>
                                <p>
                                    It is for indie authors who have no ground to start with — no platform, no connections, no industry contacts. Just a story and the nerve to post it.
                                </p>
                                <p>
                                    It is for people who want to understand the writing community, not just consume it — readers who leave real comments, beta readers who show up, editors who care.
                                </p>
                            </div>

                            {/* Core Pillars List */}
                            <ul className="space-y-3 pt-2">
                                {[
                                    "No algorithms deciding what you see",
                                    "No paywalls between you and a good story",
                                    "No engagement metrics, just genuine community"
                                ].map((pillar, i) => (
                                    <li key={i} className="flex items-start space-x-3 text-sm">
                                        <span className={`text-lg leading-none ${isDarkMode ? 'text-teal-400' : 'text-teal-600'}`}>—</span>
                                        <span className={isDarkMode ? 'text-slate-300' : 'text-slate-700'}>{pillar}</span>
                                    </li>
                                ))}
                            </ul>
                        </div>

                        {/* Section 3: Interactive Registration / Role Selection */}
                        <div className="space-y-6">
                            <div className="space-y-1">
                                <h2 className={`text-3xl font-serif-normal ${isDarkMode ? 'text-slate-100' : 'text-slate-900'}`}>
                                    Create an Account <br />To <span className={`font-serif-italic ${isDarkMode ? 'text-teal-400' : 'text-teal-600'}`}>Belong</span>
                                </h2>
                            </div>

                            {/* Role Cards Container */}
                            <div className="space-y-3">
                                {rolesData.map((role) => {
                                    const isSelected = selectedRoles.includes(role.id);
                                    return (
                                        <div 
                                            key={role.id}
                                            onClick={() => handleSelectRole(role.id)}
                                            className={`p-4 rounded-xl border transition-all duration-200 cursor-pointer flex items-start space-x-4 select-none ${
                                                isSelected 
                                                    ? 'border-teal-400 bg-teal-500/10 shadow-sm' 
                                                    : isDarkMode 
                                                        ? 'bg-[#1a1b1d] border-slate-800/80 hover:border-slate-700' 
                                                        : 'bg-white border-slate-200 hover:border-slate-300 shadow-sm'
                                            }`}
                                        >
                                            <div className={`text-xl p-2.5 rounded-lg flex items-center justify-center ${
                                                isDarkMode ? 'bg-[#222326]' : 'bg-slate-100'
                                            }`}>
                                                {role.emoji}
                                            </div>
                                            <div className="space-y-0.5">
                                                <h4 className={`text-sm font-semibold ${isDarkMode ? 'text-slate-200' : 'text-slate-800'}`}>
                                                    {role.title}
                                                </h4>
                                                <p className={`text-xs leading-relaxed ${isDarkMode ? 'text-slate-400' : 'text-slate-500'}`}>
                                                    {role.desc}
                                                </p>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>

                            {/* Main CTA Submission Button */}
                            <button className={`w-full py-4 rounded-xl font-medium text-sm transition-all duration-200 shadow-md ${
                                isDarkMode 
                                ? 'bg-teal-400 text-slate-950 hover:bg-teal-300 active:bg-teal-500' 
                                : 'bg-teal-600 text-white hover:bg-teal-500 active:bg-teal-700'
                            }`}>
                                Create Account
                            </button>
                        </div>

                    </main>

                    {/* Small branding anchor layout footer */}
                    <footer className={`text-center py-4 text-[11px] font-mono tracking-wider ${isDarkMode ? 'text-slate-600' : 'text-slate-400'}`}>
                        quirki original fiction platform engine v1.0
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<QuirkiLanding />);
    </script>
</body>
</html>
